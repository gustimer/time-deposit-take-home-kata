# Local/dev stack for the time-deposit service.
#
# `db` initializes itself from the same schema.sql the integration tests
# apply (via testcontainers), plus seed.sql with sample data across all
# plan types. Postgres runs *.sql files from docker-entrypoint-initdb.d in
# lexical order, hence the 01-/02- filename prefixes below, so the schema
# always exists before the seed data is inserted.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: time_deposit
    volumes:
      - ./adapters/outbound/postgres/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./adapters/outbound/postgres/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d time_deposit"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Same postgresql+psycopg:// scheme db.py expects (see
      # adapters/outbound/postgres/db.py DEFAULT_DATABASE_URL), pointed at
      # the `db` service instead of localhost.
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/time_deposit
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
